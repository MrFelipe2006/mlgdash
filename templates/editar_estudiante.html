<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLG · EDITAR ESTUDIANTE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mlg:    #7f00ff;
      --mlg2:   #ff00ff;
      --cyan:   #00f0ff;
      --green:  #00ff88;
      --red:    #ff3333;
      --blue:   #3af;
      --bg:     #000;
      --card:   rgba(5,0,15,0.78);
      --text:   #fff;
      --dim:    rgba(0,240,255,0.55);
      --nav-h:  58px;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: radial-gradient(ellipse at center, #0d001a 0%, #000 100%);
      color: var(--text); min-height: 100vh;
    }

    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
      pointer-events: none; z-index: 999;
    }

    .particle {
      position: fixed; border-radius: 50%;
      background: var(--mlg); opacity: 0; pointer-events: none; z-index: 0;
      animation: drift var(--d) ease-in-out infinite var(--delay);
    }
    @keyframes drift {
      0%,100%{opacity:0;transform:translateY(0)scale(.4)}
      50%{opacity:var(--op);transform:translateY(-18px)scale(1)}
    }

    .corner {
      position: fixed; width: 44px; height: 44px; z-index: 5; pointer-events: none;
      animation: cGlow 2.5s ease-in-out infinite alternate;
    }
    .corner.tl{top:14px;left:14px;border-top:2px solid var(--mlg);border-left:2px solid var(--mlg);}
    .corner.tr{top:14px;right:14px;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan);}
    .corner.bl{bottom:14px;left:14px;border-bottom:2px solid var(--mlg2);border-left:2px solid var(--mlg2);}
    .corner.br{bottom:14px;right:14px;border-bottom:2px solid var(--mlg);border-right:2px solid var(--mlg);}
    @keyframes cGlow { to { filter: drop-shadow(0 0 6px currentColor); } }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(0,0,0,0.92);
      border-bottom: 2px solid var(--mlg);
      box-shadow: 0 0 20px rgba(127,0,255,0.4);
      display: flex; align-items: center;
      padding: 0 24px; gap: 10px; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .nav-brand {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 900;
      letter-spacing: 4px; flex: 1;
      animation: brandRainbow 2s infinite linear;
    }
    @keyframes brandRainbow {
      0%  {color:#fff;text-shadow:0 0 12px var(--mlg);}
      33% {color:var(--cyan);text-shadow:0 0 12px var(--cyan);}
      66% {color:var(--mlg2);text-shadow:0 0 12px var(--mlg2);}
      100%{color:#fff;text-shadow:0 0 12px var(--mlg);}
    }
    .btn-nav {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 2px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      cursor: pointer; border: 1px solid var(--mlg);
      background: rgba(127,0,255,0.08);
      color: rgba(127,0,255,0.8);
      transition: all 0.25s; text-decoration: none;
    }
    .btn-nav:hover {
      background: rgba(127,0,255,0.25); border-color: var(--cyan);
      color: var(--cyan); box-shadow: 0 0 16px rgba(127,0,255,0.4);
      transform: translateY(-1px);
    }

    /* ── MAIN ── */
    main {
      padding-top: calc(var(--nav-h) + 40px);
      padding-bottom: 60px; max-width: 900px;
      margin: 0 auto; padding-left: 24px; padding-right: 24px;
      position: relative; z-index: 1;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px; font-weight: 900;
      letter-spacing: 5px; margin-bottom: 6px;
      animation: titleRainbow 2s infinite linear;
    }
    @keyframes titleRainbow {
      0%  {color:#fff;text-shadow:0 0 20px var(--mlg);}
      33% {color:var(--cyan);text-shadow:0 0 20px var(--cyan);}
      66% {color:var(--mlg2);text-shadow:0 0 20px var(--mlg2);}
      100%{color:#fff;text-shadow:0 0 20px var(--mlg);}
    }
    .subtitle { color: var(--dim); font-size: 13px; letter-spacing: 2px; margin-bottom: 32px; }

    .card {
      background: var(--card);
      border: 1px solid rgba(127,0,255,0.3);
      border-radius: 3px; padding: 24px; margin-bottom: 20px;
      box-shadow: 0 0 30px rgba(127,0,255,0.1), 0 8px 32px rgba(0,0,0,0.5);
    }
    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 3px;
      color: var(--dim); margin-bottom: 16px;
      text-shadow: 0 0 6px var(--cyan);
    }

    /* ── BÚSQUEDA ── */
    .search-row { display: flex; gap: 10px; align-items: center; }
    .search-input {
      flex: 1; padding: 11px 14px;
      border: 1px solid rgba(127,0,255,0.4); border-radius: 2px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; background: rgba(0,0,0,0.6);
      color: var(--cyan); caret-color: var(--mlg2);
      outline: none; transition: all 0.3s;
      text-shadow: 0 0 6px rgba(0,240,255,0.3);
    }
    .search-input::placeholder { color: rgba(0,240,255,0.2); }
    .search-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 16px rgba(0,240,255,0.2);
    }
    .btn-search {
      padding: 11px 22px; border-radius: 2px; border: none; cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--mlg), var(--cyan));
      color: #000; transition: all 0.25s;
      box-shadow: 0 0 16px rgba(127,0,255,0.4);
    }
    .btn-search:hover { transform: translateY(-1px); box-shadow: 0 0 24px rgba(0,240,255,0.5); }

    /* ── TABLA RESULTADOS ── */
    .results-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 16px; }
    .results-table th {
      text-align: left; padding: 10px 14px;
      background: rgba(127,0,255,0.1);
      border: 1px solid rgba(127,0,255,0.2);
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--dim); text-shadow: 0 0 6px var(--cyan);
    }
    .results-table td {
      padding: 10px 14px;
      border: 1px solid rgba(127,0,255,0.12);
      color: var(--text);
    }
    .results-table tr:nth-child(even) td { background: rgba(127,0,255,0.04); }
    .results-table tr.clickable { cursor: pointer; transition: background 0.15s; }
    .results-table tr.clickable:hover td { background: rgba(127,0,255,0.12); }

    .btn-select {
      padding: 5px 12px; border-radius: 2px;
      border: 1px solid rgba(0,240,255,0.4);
      background: rgba(0,240,255,0.08); color: var(--cyan);
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 700;
      cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
      text-shadow: 0 0 6px var(--cyan);
    }
    .btn-select:hover { background: rgba(0,240,255,0.2); box-shadow: 0 0 10px rgba(0,240,255,0.3); }

    .no-results { text-align: center; color: var(--dim); padding: 30px; font-size: 13px; letter-spacing: 2px; }

    /* ── SECCIÓN EDICIÓN ── */
    #editSection { display: none; }
    #editSection.visible { display: block; }

    .estudiante-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .estudiante-nombre {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px; font-weight: 900; color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan);
    }
    .estudiante-badge {
      background: rgba(127,0,255,0.12);
      border: 1px solid rgba(127,0,255,0.4);
      border-radius: 2px; padding: 4px 12px;
      font-size: 11px; color: rgba(127,0,255,0.8);
      letter-spacing: 1px; font-family: 'Orbitron', sans-serif;
    }

    .form-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px; margin-bottom: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: 2px;
      text-shadow: 0 0 6px var(--cyan);
    }
    .form-group input, .form-group select {
      padding: 10px 12px; border: 1px solid rgba(127,0,255,0.4);
      border-radius: 2px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; background: rgba(0,0,0,0.6);
      color: var(--cyan); outline: none; transition: all 0.3s;
      caret-color: var(--mlg2);
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 14px rgba(0,240,255,0.2);
    }
    .form-group select option { background: #0a0015; color: var(--text); }

    .form-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn-save {
      padding: 11px 26px; border-radius: 2px; border: none; cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--mlg), var(--cyan));
      color: #000; transition: all 0.25s;
      box-shadow: 0 0 16px rgba(127,0,255,0.4);
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 0 28px rgba(0,240,255,0.5); }

    .btn-delete {
      padding: 11px 26px;
      background: rgba(255,51,51,0.1);
      color: var(--red); border: 1px solid rgba(255,51,51,0.4);
      border-radius: 2px;
      font-family: 'Orbitron', sans-serif; font-size: 11px;
      font-weight: 700; cursor: pointer; letter-spacing: 1px;
      transition: all 0.2s; text-shadow: 0 0 6px rgba(255,51,51,0.4);
    }
    .btn-delete:hover { background: rgba(255,51,51,0.25); box-shadow: 0 0 16px rgba(255,51,51,0.3); }

    .btn-cancel {
      padding: 11px 22px;
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 2px;
      font-family: 'Orbitron', sans-serif; font-size: 10px;
      font-weight: 700; cursor: pointer; letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

    .msg {
      margin-top: 14px; padding: 10px 14px;
      border-radius: 2px; font-size: 13px;
      letter-spacing: 1px; display: none;
    }
    .msg.success {
      display: block;
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.4);
      color: var(--green); text-shadow: 0 0 6px var(--green);
    }
    .msg.error {
      display: block;
      background: rgba(255,51,51,0.1);
      border: 1px solid rgba(255,51,51,0.4);
      color: var(--red); text-shadow: 0 0 6px rgba(255,51,51,0.5);
    }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-backdrop.visible { opacity: 1; pointer-events: all; }
    .modal {
      background: rgba(5,0,15,0.95);
      border: 2px solid var(--red);
      border-radius: 3px; padding: 32px;
      max-width: 400px; width: 90%;
      box-shadow: 0 0 40px rgba(255,51,51,0.3);
      animation: modalPop 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modalPop { from{transform:scale(.85)} to{transform:scale(1)} }
    .modal h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px; letter-spacing: 3px;
      color: var(--red); text-shadow: 0 0 10px var(--red);
      margin-bottom: 14px;
    }
    .modal p { font-size: 14px; color: rgba(255,255,255,0.7); letter-spacing: 1px; margin-bottom: 20px; }
    .modal p strong { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        /* ── VIDEO EASTER EGG (presiona R) ── */
    #eggOverlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0; transition: opacity 0.35s ease;
    }
    #eggOverlay.show { opacity: 1; }
    #eggVideo {
      width: clamp(260px, 32vw, 480px);
      height: auto;
      /* chroma-key verde: screen quita el fondo verde del webm */
      mix-blend-mode: screen;
      filter: saturate(1.4) contrast(1.1);
      display: block;
      /* sin border ni sombra: el video flota libremente sobre la UI */
    }
  </style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<nav>
  <div class="nav-brand">🎮 MLG · EDITAR ESTUDIANTE</div>
  <a class="btn-nav" href="/dashprincipal">← VOLVER</a>
</nav>

<main>
  <h1>✏️ EDITAR ESTUDIANTE</h1>
  <p class="subtitle">▶ BUSCA, EDITA O ELIMINA UN GUERRERO ◀</p>

  <!-- Búsqueda -->
  <div class="card">
    <div class="card-title">🔍 BUSCAR ESTUDIANTE</div>
    <div class="search-row">
      <input class="search-input" type="text" id="searchInput" placeholder="Nombre del guerrero...">
      <button class="btn-search" onclick="buscar()">BUSCAR</button>
    </div>
    <div id="searchResults"></div>
  </div>

  <!-- Sección edición -->
  <div id="editSection" class="card">
    <div class="card-title">⚔️ MODIFICAR DATOS</div>
    <input type="hidden" id="editId">
    <div class="estudiante-header">
      <div class="estudiante-nombre" id="editNombreHeader">—</div>
      <div class="estudiante-badge" id="editIdBadge">ID: —</div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="editNombre" placeholder="Nombre completo">
      </div>
      <div class="form-group">
        <label>Edad</label>
        <input type="number" id="editEdad" min="15" max="80" placeholder="Edad">
      </div>
      <div class="form-group">
        <label>Carrera</label>
        <select id="editCarrera">
          <option value="Ingenieria">Ingeniería</option>
          <option value="Fisica">Física</option>
          <option value="Matematicas">Matemáticas</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nota 1</label>
        <input type="number" id="editNota1" min="0" max="5" step="0.1" placeholder="0.0 – 5.0">
      </div>
      <div class="form-group">
        <label>Nota 2</label>
        <input type="number" id="editNota2" min="0" max="5" step="0.1" placeholder="0.0 – 5.0">
      </div>
      <div class="form-group">
        <label>Nota 3</label>
        <input type="number" id="editNota3" min="0" max="5" step="0.1" placeholder="0.0 – 5.0">
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-save"   onclick="guardarCambios()">💾 GUARDAR</button>
      <button class="btn-delete" onclick="confirmarEliminar()">💀 ELIMINAR</button>
      <button class="btn-cancel" onclick="cancelarEdicion()">CANCELAR</button>
    </div>
    <div class="msg" id="editMsg"></div>
  </div>
</main>

<!-- Modal confirmar eliminar -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3>⚠️ ¿ELIMINAR GUERRERO?</h3>
    <p>Esta acción no se puede deshacer. El estudiante <strong id="modalNombre"></strong> será eliminado permanentemente de la arena.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal()">CANCELAR</button>
      <button class="btn-delete" onclick="eliminarEstudiante()">💀 SÍ, ELIMINAR</button>
    </div>
  </div>
</div>

<!-- VIDEO EASTER EGG (presiona R) -->
<div id="eggOverlay">
  <video id="eggVideo" src="/static/chroma-keyed-video.webm" preload="auto" playsinline></video>
</div>
<audio id="vineAudio" src="/static/Vine boom sound effect.mp3" preload="auto"></audio>

<script>
  // Partículas
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    const sz = Math.random() * 2.5 + 1;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;--d:${3+Math.random()*5}s;--delay:-${Math.random()*5}s;--op:${.1+Math.random()*.25};`;
    document.body.appendChild(p);
  }

  let estudianteSeleccionado = null;

  async function buscar() {
    const q = document.getElementById('searchInput').value.trim();
    const res  = await fetch(`/api/estudiantes/buscar?nombre=${encodeURIComponent(q)}`);
    const data = await res.json();
    renderTabla(data.estudiantes);
  }

  async function cargarTodos() {
    const res  = await fetch('/api/estudiantes/buscar?nombre=');
    const data = await res.json();
    renderTabla(data.estudiantes);
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
  });

  function renderTabla(estudiantes) {
    const container = document.getElementById('searchResults');
    if (!estudiantes || estudiantes.length === 0) {
      container.innerHTML = '<div class="no-results">💀 No se encontraron guerreros.</div>';
      return;
    }
    let html = `<table class="results-table">
      <thead><tr>
        <th>ID</th><th>Nombre</th><th>Edad</th>
        <th>Carrera</th><th>Nota 1</th><th>Nota 2</th><th>Nota 3</th><th></th>
      </tr></thead><tbody>`;
    estudiantes.forEach(e => {
      const eJson = JSON.stringify(e).replace(/"/g, '&quot;');
      html += `<tr class="clickable" onclick="seleccionar(${eJson})">
        <td style="color:rgba(0,240,255,0.5)">${e.id}</td>
        <td><strong style="color:#fff">${e.nombre}</strong></td>
        <td>${e.edad}</td>
        <td>${e.carrera}</td>
        <td>${e.nota1}</td><td>${e.nota2}</td><td>${e.nota3}</td>
        <td><button class="btn-select" onclick="event.stopPropagation();seleccionar(${eJson})">SELECT</button></td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function seleccionar(est) {
    estudianteSeleccionado = est;
    document.getElementById('editId').value             = est.id;
    document.getElementById('editNombre').value         = est.nombre;
    document.getElementById('editEdad').value           = est.edad;
    document.getElementById('editCarrera').value        = est.carrera;
    document.getElementById('editNota1').value          = est.nota1;
    document.getElementById('editNota2').value          = est.nota2;
    document.getElementById('editNota3').value          = est.nota3;
    document.getElementById('editNombreHeader').textContent = est.nombre;
    document.getElementById('editIdBadge').textContent      = `ID: ${est.id}`;
    const sec = document.getElementById('editSection');
    sec.classList.add('visible');
    document.getElementById('editMsg').className = 'msg';
    document.getElementById('editMsg').textContent = '';
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function cancelarEdicion() {
    estudianteSeleccionado = null;
    document.getElementById('editSection').classList.remove('visible');
  }

  async function guardarCambios() {
    const id     = document.getElementById('editId').value;
    const nombre = document.getElementById('editNombre').value.trim();
    const edad   = document.getElementById('editEdad').value;
    const carrera= document.getElementById('editCarrera').value.trim();
    const nota1  = document.getElementById('editNota1').value;
    const nota2  = document.getElementById('editNota2').value;
    const nota3  = document.getElementById('editNota3').value;

    if (!nombre || !edad || !carrera || !nota1 || !nota2 || !nota3) {
      mostrarMsg('⚠️ Completa todos los campos, guerrero.', 'error'); return;
    }

    const res  = await fetch('/api/estudiantes/editar', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id, nombre, edad: parseInt(edad), carrera,
        nota1: parseFloat(nota1), nota2: parseFloat(nota2), nota3: parseFloat(nota3) })
    });
    const data = await res.json();
    if (data.ok) {
      mostrarMsg('✅ Guerrero actualizado. MLG confirmed.', 'success');
      document.getElementById('editNombreHeader').textContent = nombre;
      buscar();
    } else {
      mostrarMsg('❌ ' + data.error, 'error');
    }
  }

  function confirmarEliminar() {
    document.getElementById('modalNombre').textContent = estudianteSeleccionado?.nombre || '';
    document.getElementById('modalBackdrop').classList.add('visible');
  }
  function cerrarModal() {
    document.getElementById('modalBackdrop').classList.remove('visible');
  }

  async function eliminarEstudiante() {
    cerrarModal();
    const id = document.getElementById('editId').value;
    const res  = await fetch('/api/estudiantes/eliminar', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id })
    });
    const data = await res.json();
    if (data.ok) {
      mostrarMsg('💀 Guerrero eliminado de la arena.', 'success');
      cancelarEdicion(); buscar();
    } else {
      mostrarMsg('❌ ' + data.error, 'error');
    }
  }

  function mostrarMsg(texto, tipo) {
    const el = document.getElementById('editMsg');
    el.textContent = texto; el.className = `msg ${tipo}`;
  }

    // Video easter egg (presiona R)
  (function () {
    var eggTimer = null;
    var vid = document.getElementById('eggVideo');

    document.addEventListener('keydown', function (e) {
      if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
      if (e.key === 'r' || e.key === 'R') showEgg();
    });

    function showEgg() {
      var overlay = document.getElementById('eggOverlay');
      var audio   = document.getElementById('vineAudio');
      clearTimeout(eggTimer);
      // reiniciar animación de overlay
      overlay.classList.remove('show');
      void overlay.offsetWidth;
      overlay.classList.add('show');
      // reiniciar y reproducir video
      vid.currentTime = 0;
      vid.play().catch(function(){});
      // sonido
      audio.currentTime = 0;
      audio.play().catch(function(){});
      // esconder cuando termine el video (o tras 8s máximo)
      vid.onended = function() { overlay.classList.remove('show'); };
      eggTimer = setTimeout(function () { overlay.classList.remove('show'); }, 8000);
    }
  })();

  cargarTodos();
</script>
<script src="{{ url_for('static', filename='banana.js') }}"></script>
</body>
